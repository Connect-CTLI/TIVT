<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Irregularities · Tap to Categorise</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #001489;
    --red:     #D73828;
    --blue:    #007DBA;
    --lime:    #C4D600;
    --yellow:  #FFC600;
    --white:   #FFFFFF;
    --bg:      #F2F4FB;
    --font-body:    'Century Gothic','CenturyGothic','Nunito','Trebuchet MS',Arial,sans-serif;
    --font-display: 'Gotham','Century Gothic','CenturyGothic','Nunito','Franklin Gothic Medium',Arial,sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--primary);
    min-height: 100vh;
    padding-bottom: 16px;
  }

  /* ── Header ── */
  .act-header {
    background: var(--primary);
    padding: 22px 20px 16px;
    text-align: center;
  }
  .eyebrow {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 8px;
  }
  .act-header h1 {
    font-family: var(--font-display);
    font-size: clamp(15px, 4.2vw, 20px);
    font-weight: 800;
    font-style: italic;
    line-height: 1.25;
    color: var(--white);
  }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--primary); height: 6px; border-top: 1px solid rgba(255,255,255,0.1); }
  .progress-fill {
    height: 6px;
    background: var(--yellow);
    transition: width 0.45s ease;
    width: 0%;
  }

  /* ── Score strip ── */
  .score-strip {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    background: var(--primary);
    padding: 6px 20px 16px;
    flex-wrap: wrap;
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.5px;
  }
  .score-pill .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-correct { background: var(--lime); }
  .dot-wrong   { background: var(--red); }
  .dot-remain  { background: rgba(255,255,255,0.35); }

  /* ── Container ── */
  .container { max-width: 560px; margin: 0 auto; padding: 10px 16px 0; }

  /* ── Card ── */
  .card-wrap { margin-bottom: 16px; }

  .card {
    background: var(--white);
    border-radius: 14px;
    border-top: 5px solid var(--blue);
    box-shadow: 0 4px 20px rgba(0,20,137,0.12);
    padding: 24px 22px 20px;
    text-align: center;
    min-height: 148px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.32s ease, opacity 0.28s ease;
  }

  /* Bounce-in when a new card loads */
  @keyframes bounceIn {
    0%   { transform: scale(0.88) translateY(10px); opacity: 0; }
    60%  { transform: scale(1.03) translateY(-3px); opacity: 1; }
    100% { transform: scale(1)    translateY(0);    opacity: 1; }
  }
  .card.bounce-in { animation: bounceIn 0.38s cubic-bezier(.34,1.56,.64,1) both; }

  .card.fly-out-correct { transform: translateX(120px) rotate(7deg);  opacity: 0; }
  .card.fly-out-wrong   { transform: translateX(-120px) rotate(-7deg); opacity: 0; }

  .card-counter {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 12px;
    opacity: 0.7;
  }
  .card-text {
    font-family: var(--font-body);
    font-size: clamp(14px, 3.6vw, 16px);
    font-weight: 600;
    color: var(--primary);
    line-height: 1.55;
  }

  /* ── Feedback block (replaces single pill for wrong answers) ── */
  .card-feedback { display: none; margin-top: 14px; width: 100%; }
  .card-feedback.visible { display: block; }

  .fb-pill {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 12.5px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 20px;
    margin-bottom: 0;
  }
  .fb-pill.correct { background: var(--lime);    color: var(--primary); }
  .fb-pill.wrong   { background: var(--red);     color: var(--white); }

  /* Reason line — only shown on wrong answers */
  .fb-reason {
    display: none;
    margin-top: 10px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-style: italic;
    color: var(--primary);
    line-height: 1.5;
    background: rgba(0,20,137,0.06);
    border-left: 3px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 8px 12px;
    text-align: left;
  }
  .fb-reason.visible { display: block; }

  /* ── Category buttons ── */
  .cat-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    text-align: center;
    margin-bottom: 11px;
    opacity: 0.5;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .cat-btn {
    border: none;
    border-radius: 10px;
    padding: 14px 12px;
    font-family: var(--font-display);
    font-size: 12.5px;
    font-weight: 700;
    color: var(--white);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.35;
    transition: transform 0.12s, opacity 0.2s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  }
  .cat-btn:active { transform: scale(0.96); }
  .cat-btn.disabled { opacity: 0.38; pointer-events: none; }

  .cat-btn[data-cat="candidate"] { background: var(--red); }
  .cat-btn[data-cat="script"]    { background: var(--primary); }
  .cat-btn[data-cat="admin"]     { background: var(--blue); }
  .cat-btn[data-cat="venue"]     { background: var(--yellow); color: var(--primary); }

  .cat-btn.flash-correct { animation: flashCorrect 0.55s ease forwards; }
  .cat-btn.flash-wrong   { animation: flashWrong   0.55s ease forwards; }

  @keyframes flashCorrect {
    0%   { outline: 0px solid var(--lime); }
    40%  { outline: 4px solid var(--lime); filter: brightness(1.25); }
    100% { outline: 0px solid var(--lime); filter: brightness(1); }
  }
  @keyframes flashWrong {
    0%   { filter: brightness(1); }
    35%  { filter: brightness(0.55) grayscale(0.6); }
    100% { filter: brightness(1); }
  }

  .cat-btn .btn-icon  { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  .cat-btn .btn-label { flex: 1; }

  /* ── Results screen ── */
  .results-screen { display: none; text-align: center; padding: 8px 0; }
  .results-screen.visible { display: block; }

  .result-hero {
    background: var(--primary);
    border-radius: 14px;
    padding: 30px 24px 26px;
    margin-bottom: 16px;
  }
  .result-emoji { font-size: 46px; margin-bottom: 10px; }
  .result-score {
    font-family: var(--font-display);
    font-size: 54px;
    font-weight: 800;
    color: var(--yellow);
    line-height: 1;
  }
  .result-denom {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--white);
    opacity: 0.6;
    margin-top: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .result-msg {
    font-family: var(--font-body);
    font-size: 14px;
    font-style: italic;
    margin-top: 14px;
    line-height: 1.6;
    color: var(--white);
    opacity: 0.9;
  }

  .btn-try-again {
    width: 100%;
    padding: 15px;
    background: var(--red);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .btn-try-again:active { opacity: 0.8; }

  .game-area.hidden { display: none; }

  /* ── Single-column on very narrow screens ── */
  @media (max-width: 360px) {
    .cat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="act-header">
  <p class="eyebrow">Examination Irregularities</p>
  <h1>Which Category Does Each Irregularity Belong To?</h1>
</div>
<div class="progress-wrap">
  <div class="progress-fill" id="progress-fill"></div>
</div>
<div class="score-strip">
  <div class="score-pill"><span class="dot dot-correct"></span><span id="count-correct">0</span>&nbsp;correct</div>
  <div class="score-pill"><span class="dot dot-wrong"></span><span id="count-wrong">0</span>&nbsp;wrong</div>
  <div class="score-pill"><span class="dot dot-remain"></span><span id="count-remain">16</span>&nbsp;to go</div>
</div>

<div class="container">

  <!-- Game -->
  <div class="game-area" id="game-area">
    <div class="card-wrap">
      <div class="card" id="card">
        <p class="card-counter" id="card-counter">Item 1 of 16</p>
        <p class="card-text"   id="card-text"></p>
        <div class="card-feedback" id="card-feedback">
          <span class="fb-pill"   id="fb-pill"></span>
          <div  class="fb-reason" id="fb-reason"></div>
        </div>
      </div>
    </div>

    <p class="cat-label">Tap the correct category</p>
    <div class="cat-grid" id="cat-grid">
      <!-- Buttons injected by JS so order shuffles each card -->
    </div>
  </div>

  <!-- Results -->
  <div class="results-screen" id="results-screen">
    <div class="result-hero">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-denom">out of 16</div>
      <p class="result-msg" id="result-msg"></p>
    </div>
    <button class="btn-try-again" onclick="restart()">↩ Try Again</button>
  </div>

</div>

<script>
/* ── Data ─────────────────────────────────────────────────────────────── */
const ITEMS = [
  {
    id:'i1', cat:'candidate',
    text:'Possession of an unauthorised electronic device (cellphone)',
    reason:'This is Candidate Misconduct — the candidate deliberately brought a prohibited item into the venue.'
  },
  {
    id:'i2', cat:'candidate',
    text:'Copying and/or assistance from an invigilator or fellow candidate',
    reason:'This is Candidate Misconduct — it involves dishonest behaviour by the candidate during the exam.'
  },
  {
    id:'i3', cat:'candidate',
    text:'Possession of unauthorised material (crib notes)',
    reason:'This is Candidate Misconduct — bringing in crib notes is a deliberate attempt to cheat.'
  },
  {
    id:'i4', cat:'script',
    text:'Removal of the script from the examination venue',
    reason:'This is a Script Violation — it involves the physical integrity and control of the answer script itself.'
  },
  {
    id:'i5', cat:'script',
    text:'Not batching scripts correctly or not submitting answer scripts within the required time to the WCED',
    reason:'This is a Script Violation — it relates to how scripts are handled and submitted after the exam.'
  },
  {
    id:'i6', cat:'script',
    text:'Candidate wrote the incorrect question paper, subject or level (e.g. Home Language instead of First Additional Language)',
    reason:'This is a Script Violation — the wrong paper was written, directly affecting the validity of the script.'
  },
  {
    id:'i7', cat:'admin',
    text:'Tearing a page out of an answer book',
    reason:'This is a Candidate Administration issue — it relates to how the candidate used and returned their answer book.'
  },
  {
    id:'i8', cat:'admin',
    text:'Late arrival within the first hour (e.g. 09:00–10:00 or 14:00–15:00)',
    reason:'This is a Candidate Administration issue — late arrivals within the first hour must be managed and recorded by the invigilator.'
  },
  {
    id:'i9', cat:'admin',
    text:'Late arrival after the first hour (e.g. after 10:00 or 15:00)',
    reason:'This is a Candidate Administration issue — candidates arriving after the first hour may not be admitted; this must be documented.'
  },
  {
    id:'i10', cat:'admin',
    text:'No admission letter or ID document',
    reason:'This is a Candidate Administration issue — the invigilator must follow procedure when a candidate cannot produce the required documents.'
  },
  {
    id:'i11', cat:'admin',
    text:'Name not on the mark sheet or Script Control Register',
    reason:'This is a Candidate Administration issue — it involves a discrepancy in the official candidate records at the venue.'
  },
  {
    id:'i12', cat:'admin',
    text:'Candidate wrote at an incorrect centre',
    reason:'This is a Candidate Administration issue — the candidate sat the exam at the wrong venue, which must be formally recorded.'
  },
  {
    id:'i13', cat:'admin',
    text:'Candidate wrote an incorrect subject',
    reason:'This is a Candidate Administration issue — the candidate sat the wrong subject, which requires administrative correction and reporting.'
  },
  {
    id:'i14', cat:'admin',
    text:'Candidate wrote their name on the cover of the answer script',
    reason:'This is a Candidate Administration issue — scripts must remain anonymous; writing a name on the cover violates marking integrity procedures.'
  },
  {
    id:'i15', cat:'venue',
    text:'Power outage or load shedding',
    reason:'This is a Venue / Technical issue — it is caused by external infrastructure, not the candidate or invigilator.'
  },
  {
    id:'i16', cat:'venue',
    text:'Technical problems with equipment',
    reason:'This is a Venue / Technical issue — equipment failure is an environmental problem at the examination venue.'
  },
];

const CATS = [
  { id:'candidate', label:'Candidate Misconduct',    icon:'🚫' },
  { id:'script',    label:'Script Violations',       icon:'📋' },
  { id:'admin',     label:'Candidate Administration',icon:'📝' },
  { id:'venue',     label:'Venue / Technical Issues',icon:'🏫' },
];

const CAT_NAMES = Object.fromEntries(CATS.map(c => [c.id, c.label]));

let queue = [], current = 0, correct = 0, wrong = 0, answered = false;

/* ── Utilities ─────────────────────────────────────────────────────────── */
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ── Render buttons in a fresh shuffled order ────────────────────────── */
function renderButtons() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  shuffle(CATS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat.id;
    btn.setAttribute('aria-label', `Category: ${cat.label}`);
    btn.innerHTML = `<span class="btn-icon">${cat.icon}</span><span class="btn-label">${cat.label}</span>`;
    btn.addEventListener('click', () => answer(cat.id));
    grid.appendChild(btn);
  });
}

/* ── Init ────────────────────────────────────────────────────────────── */
function init() {
  queue = shuffle(ITEMS);
  current = 0; correct = 0; wrong = 0; answered = false;
  updateStrip();
  showCard();
}

/* ── Show card ───────────────────────────────────────────────────────── */
function showCard() {
  answered = false;

  const item = queue[current];
  document.getElementById('card-counter').textContent = `Item ${current + 1} of ${queue.length}`;
  document.getElementById('card-text').textContent    = item.text;

  // Reset feedback
  const fb     = document.getElementById('card-feedback');
  const pill   = document.getElementById('fb-pill');
  const reason = document.getElementById('fb-reason');
  fb.classList.remove('visible');
  pill.className   = 'fb-pill';
  pill.textContent = '';
  reason.classList.remove('visible');
  reason.textContent = '';

  // Reset card animation
  const card = document.getElementById('card');
  card.classList.remove('fly-out-correct','fly-out-wrong','bounce-in');
  card.style.transform = '';
  card.style.opacity   = '';

  // Trigger bounce-in on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => card.classList.add('bounce-in'));
  });

  // Fresh shuffled buttons
  renderButtons();
  updateProgress();
}

/* ── Answer ──────────────────────────────────────────────────────────── */
function answer(chosen) {
  if (answered) return;
  answered = true;
  disableBtns();

  const item      = queue[current];
  const isCorrect = chosen === item.cat;

  // Flash tapped button
  const btn = document.querySelector(`.cat-btn[data-cat="${chosen}"]`);
  if (btn) {
    btn.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');
    setTimeout(() => btn.classList.remove('flash-correct','flash-wrong'), 600);
  }

  // Show feedback
  const fb     = document.getElementById('card-feedback');
  const pill   = document.getElementById('fb-pill');
  const reason = document.getElementById('fb-reason');

  if (isCorrect) {
    pill.textContent = '✓ Correct!';
    pill.className   = 'fb-pill correct';
    correct++;
  } else {
    pill.textContent = `✗ That belongs to: ${CAT_NAMES[item.cat]}`;
    pill.className   = 'fb-pill wrong';
    reason.textContent = item.reason;
    reason.classList.add('visible');
    wrong++;
  }
  fb.classList.add('visible');
  updateStrip();

  // Longer pause on wrong so the reason can be read
  const pause = isCorrect ? 1000 : 4500;
  const card  = document.getElementById('card');

  setTimeout(() => {
    card.classList.remove('bounce-in');
    card.classList.add(isCorrect ? 'fly-out-correct' : 'fly-out-wrong');
    setTimeout(() => {
      current++;
      if (current < queue.length) showCard();
      else showResults();
    }, 320);
  }, pause);
}

/* ── Strip & progress ───────────────────────────────────────────────── */
function updateStrip() {
  document.getElementById('count-correct').textContent = correct;
  document.getElementById('count-wrong').textContent   = wrong;
  document.getElementById('count-remain').textContent  = Math.max(0, queue.length - current);
}
function updateProgress() {
  document.getElementById('progress-fill').style.width = ((current / queue.length) * 100) + '%';
}

/* ── Button helpers ─────────────────────────────────────────────────── */
function disableBtns() { document.querySelectorAll('.cat-btn').forEach(b => b.classList.add('disabled')); }
function enableBtns()  { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('disabled')); }

/* ── Results ─────────────────────────────────────────────────────────── */
function showResults() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('game-area').classList.add('hidden');

  const pct = Math.round((correct / queue.length) * 100);
  let emoji, msg;
  if (pct === 100) {
    emoji = '🏆';
    msg   = 'Outstanding! You correctly categorised every irregularity — you\'re well prepared to handle these situations.';
  } else if (pct >= 75) {
    emoji = '👍';
    msg   = 'Great effort! Review any items where you saw the reason appear and give it another go.';
  } else if (pct >= 50) {
    emoji = '📚';
    msg   = 'Good start. Pay close attention to the differences between misconduct, script violations, and admin issues.';
  } else {
    emoji = '💡';
    msg   = 'Keep at it — review the four categories carefully and give it another go.';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = correct;
  document.getElementById('result-msg').textContent   = msg;
  document.getElementById('results-screen').classList.add('visible');
}

/* ── Restart ─────────────────────────────────────────────────────────── */
function restart() {
  document.getElementById('results-screen').classList.remove('visible');
  document.getElementById('game-area').classList.remove('hidden');
  init();
}

init();
</script>
</body>
</html>
